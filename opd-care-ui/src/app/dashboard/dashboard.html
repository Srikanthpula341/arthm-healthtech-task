<div class="row g-4">
  <div class="col-md-12">
    <div class="card shadow-sm border-0 bg-primary text-white" style="border-radius: 12px;">
      <div class="card-body p-4 d-flex justify-content-between align-items-center">
        <div>
          <h2 class="fw-bold mb-1">Welcome back, {{ auth.role() }}!</h2>
          <p class="mb-0 text-white-50">Here is what's happening today in the OPD.</p>
        </div>
        <i class="bi bi-activity p-3 bg-white text-primary rounded-circle fs-2 shadow-sm"></i>
      </div>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card shadow-sm border-0 h-100" style="border-radius: 12px; border-left: 5px solid #0d6efd !important;">
      <div class="card-body mb-3">
        <h6 class="text-muted fw-bold text-uppercase mb-3">Today's Appointments</h6>
        <div class="d-flex align-items-center">
            <h1 class="fw-bolder mb-0 text-dark me-3 display-4">{{ todayAppointments.length }}</h1>
            <i class="bi bi-calendar2-check text-primary fs-2 opacity-50"></i>
        </div>
      </div>
    </div>
  </div>
</div>
