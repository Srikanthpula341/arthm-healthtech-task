<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="fw-bold text-dark mb-0">Book Appointment</h2>
  <button class="btn btn-outline-secondary fw-bold shadow-sm rounded-pill px-4" routerLink="/appointments">
    <i class="bi bi-arrow-left"></i> Back
  </button>
</div>

<div class="card shadow-sm border-0" style="border-radius: 12px; max-width: 600px; margin: 0 auto;">
  <div class="card-body p-5">
    <form [formGroup]="appointmentForm" (ngSubmit)="onSubmit()">
      
      <div class="mb-3">
        <label class="form-label text-secondary fw-semibold">Doctor</label>
        <select formControlName="doctorId" class="form-select bg-light">
          <option value="" disabled selected>Select a doctor...</option>
          <option *ngFor="let d of doctors" [value]="d.userId">{{ d.fullName }}</option>
        </select>
        <div *ngIf="appointmentForm.get('doctorId')?.touched && appointmentForm.get('doctorId')?.invalid" class="text-danger small mt-1 fw-semibold">
          <i class="bi bi-exclamation-circle"></i> Doctor is required.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label text-secondary fw-semibold">Patient</label>
        <select formControlName="patientId" class="form-select bg-light">
          <option value="" disabled selected>Select an existing patient...</option>
          <option *ngFor="let p of patients" [value]="p.patientId || p.id">{{ p.name }} (#{{ p.patientId || p.id }}) - {{ p.phone }}</option>
        </select>
        <div *ngIf="appointmentForm.get('patientId')?.touched && appointmentForm.get('patientId')?.invalid" class="text-danger small mt-1 fw-semibold">
          <i class="bi bi-exclamation-circle"></i> Patient is required.
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-4">
          <label class="form-label text-secondary fw-semibold">Date</label>
          <input type="date" formControlName="appointmentDate" class="form-control bg-light">
          <div *ngIf="appointmentForm.get('appointmentDate')?.touched && appointmentForm.get('appointmentDate')?.invalid" class="text-danger small mt-1 fw-semibold">
            <i class="bi bi-exclamation-circle"></i> Date is required.
          </div>
        </div>
        
        <div class="col-md-6 mb-4">
          <label class="form-label text-secondary fw-semibold">Time</label>
          <select formControlName="appointmentTime" class="form-select bg-light">
            <option value="" disabled selected>Select an hour...</option>
            <option value="09:00">09:00 AM</option>
            <option value="10:00">10:00 AM</option>
            <option value="11:00">11:00 AM</option>
            <option value="12:00">12:00 PM</option>
            <option value="13:00">01:00 PM</option>
            <option value="14:00">02:00 PM</option>
            <option value="15:00">03:00 PM</option>
            <option value="16:00">04:00 PM</option>
            <option value="17:00">05:00 PM</option>
          </select>
          <div class="form-text mt-1">09:00 AM - 05:00 PM (1-hour slots)</div>
          <div *ngIf="appointmentForm.get('appointmentTime')?.touched && appointmentForm.get('appointmentTime')?.invalid" class="text-danger small mt-1 fw-semibold">
            <i class="bi bi-exclamation-circle"></i> Time is required.
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm rounded-pill fw-bold">Confirm Booking</button>
    </form>
  </div>
</div>
