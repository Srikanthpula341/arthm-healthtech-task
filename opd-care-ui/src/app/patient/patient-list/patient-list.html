<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="fw-bold text-dark mb-0">Patients</h2>
  <button class="btn btn-primary fw-bold shadow-sm rounded-pill px-4" routerLink="/patients/new">
    <i class="bi bi-plus-lg"></i> Add Patient
  </button>
</div>

<div class="card shadow-sm border-0" style="border-radius: 12px;">
  <div class="card-body p-4">
    <div class="input-group mb-4" style="max-width: 400px;">
      <span class="input-group-text bg-light border-end-0"><i class="bi bi-search"></i></span>
      <input type="text" class="form-control bg-light border-start-0" placeholder="Search by name or phone..." [(ngModel)]="searchQuery" (keyup.enter)="onSearch()">
      <button class="btn btn-primary px-3 fw-semibold" (click)="onSearch()">Search</button>
    </div>

    <div class="table-responsive">
      <table class="table align-middle table-hover">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Gender</th>
            <th>Age</th>
            <th>Phone</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of patients">
            <td class="text-muted">#{{ p.patientId || p.id }}</td>
            <td class="fw-bold text-dark">{{ p.name }}</td>
            <td><span class="badge bg-secondary rounded-pill px-3">{{ p.gender }}</span></td>
            <td>{{ p.age }} yrs</td>
            <td>{{ p.phone }}</td>
            <td>
              <button class="btn btn-sm btn-outline-primary rounded-pill px-3 fw-semibold" routerLink="/appointments/new" [queryParams]="{patientId: p.patientId || p.id}">Book Appt</button>
            </td>
          </tr>
          <tr *ngIf="patients.length === 0">
            <td colspan="6" class="text-center text-muted py-5">
              <i class="bi bi-people display-4 text-secondary opacity-50 d-block mb-3"></i>
              No patients found. Create one to get started.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
